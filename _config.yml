## [3. AI Analysis Workflow](/docs/ai-metadata-generation-cloud-local-ollama.html)
1. **[AI Mode Selection:](/docs/ai-metadata-generation-cloud-local-ollama.html)** Choose **[Cloud](/docs/ai-metadata-generation-cloud-local-ollama.html#4-tier-ai-engine-choose-your-processing-path), [Local](/docs/ai-metadata-generation-cloud-local-ollama.html#2-local-ai), [Hybrid](/docs/ai-metadata-generation-cloud-local-ollama.html#3-hybrid-ai),** or **[2-Pass Local](/docs/ai-metadata-generation-cloud-local-ollama.html#4-two-step-local-ai)** in settings.
2. **Load Assets:** Click **Load Folders** to scan your directory for images and videos.
3. **Select Files:** Highlight assets using `Shift + Click` (range) or `Ctrl + Click` (individual).
4. **[Choose Profile:](/docs/advanced-ai-prompting-profiles-variables.html#4-profile-management-and-workflows)** Select the system prompt profile (e.g., "Editorial").
5. **Run & Monitor:** Click the green **[Run AI](#versatile-ai-engine-choose-your-workflow)** button. Monitor real-time **[Cost Statistics](/docs/ai-metadata-generation-cloud-local-ollama.html#1-cloud-ai)** with 6-decimal precision.

