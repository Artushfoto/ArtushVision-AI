# --- _config.yml ---
# Hlavní nastavení dokumentace ArtushVision AI
title: "ArtushVision AI"
description: "Ultimate AI-powered workstation for photography metadata, Getty Images optimization, and global stock distribution."
lang: en
url: "https://vision.artushfoto.eu"
baseurl: "" # Ponechte prázdné, web běží přímo z kořene subdomény

# Nastavení kompilace a formátování textu
markdown: kramdown
highlighter: rouge

# Povolené pluginy pro bezpečné sestavení na GitHub Pages
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Soubory a složky, které má kompilátor ignorovat
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .github/

# Nastavení Google Analytics
google_analytics: "G-9CH7W6CRCH"

# Vypne automatické generování názvu projektu v záhlaví stránek
show_downloads: false
# --- _config.yml ---
