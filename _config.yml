## [Versatile AI Engine: Choose Your Workflow](/docs/ai-metadata-generation-cloud-local-ollama.html)
ArtushVision AI provides four distinct AI pathways to balance privacy, cost, and precision.

* **[Cloud AI](/docs/ai-metadata-generation-cloud-local-ollama.html#1-cloud-ai-openrouter) (Fast & Maximum Intelligence):** Uses top-tier models via [OpenRouter](/docs/cloud-ai-openrouter-api-setup.html). Process up to **150,000 photos for just $5** with ultra-low API costs.
* **[Local AI](/docs/local-ai-model-manager-ollama.html#local-ai-model-manager-complete-offline-control) (Total Privacy):** Run everything on your hardware using offline **[Ollama](/docs/ollama-installation-guide.html)** models via the [Local Model Manager](/docs/local-ai-model-manager-ollama.html). Your photos stay on your device; analysis is completely free.
* **[Hybrid AI](/docs/ai-metadata-generation-cloud-local-ollama.html#3-hybrid-ai-local-vision--cloud-text) (Local Vision + Cloud Description):** Phase 1 uses local visual analysis, while Phase 2 utilizes cloud threading for text formatting. **Photos never leave your device; only generated text is sent for SEO processing.**
* **[2-Pass Local AI](/docs/ai-metadata-generation-cloud-local-ollama.html#4-two-step-local-ai) (Deep Offline Synthesis):** The flagship offline workflow.
  * **Pass 1:** Deep Visual Analysis using a powerful dedicated Vision Model.
  * **Pass 2:** Professional Synthesis using a high-performance Text Model for elite results without API costs.

