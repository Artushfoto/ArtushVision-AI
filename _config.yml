## [5. Manual Editing & Detail View](/docs/manual-editing-detailed-photo-view.html)
Double-click any image to enter the **[Detail Photo View](/docs/manual-editing-detailed-photo-view.html)**.

* **[Culling Tools](/docs/smart-manual-keywording-batch-editing.html#visual-culling-ratings-flags-and-color-labels):** Rapidly rate and flag photos (1-5, P, X).
* **[The Editor](/docs/manual-editing-detailed-photo-view.html#title-and-description-editor):** Features real-time word counters and **[Multilingual Spell Check](/docs/manual-editing-detailed-photo-view.html#linguistic-intelligence-and-translation-tools)** (right-click for suggestions).
* **[Keyword Bubbles](/docs/manual-editing-detailed-photo-view.html#interactive-keyword-bubbles-and-drag-and-drop):** Drag and drop to reorder. 🔵 (AI), 🟢 (Manual), ⚫ (Original).
* **[Linguistic Tools](/docs/manual-editing-detailed-photo-view.html#linguistic-intelligence-and-translation-tools):** Right-click a bubble for **[Synonyms](/docs/manual-editing-detailed-photo-view.html#linguistic-intelligence-and-translation-tools)** (Datamuse) or view native Translation Tooltips.
* **[Interactive Map](/docs/manual-editing-detailed-photo-view.html#geospatial-tools-and-interactive-mapping):** View exact GPS locations with zoom and satellite support.

