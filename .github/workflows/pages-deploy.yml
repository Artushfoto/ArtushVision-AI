name: Deploy Jekyll site with Pagefind

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true # Automaticky si přečte Gemfile a nacachuje ho pro rychlost

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --destination _site
        env:
          JEKYLL_ENV: production
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8

      # GENIALITA PAGEFINDU: Tady se na základě hotových HTML souborů sestaví chytré vyhledávání
      - name: Run Pagefind Search Indexer
        run: npx pagefind --site _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
