name: Deploy Jekyll site with Pagefind

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      # Instalace Jekyllu a balíčků
      - name: Install Jekyll and Dependencies
        run: |
          gem install jekyll jekyll-sitemap jekyll-feed

      # Bezpečné sestavení s vynuceným UTF-8 kódováním a vypnutým striktním režimem
      - name: Build Site
        run: jekyll build --destination _site --safe
        env:
          JEKYLL_ENV: production
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8

      # Sestavení vyhledávacího indexu nad vygenerovaným HTML
      - name: Run Pagefind Search Indexer
        run: npx pagefind --site _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
