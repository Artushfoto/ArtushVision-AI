name: Deploy Jekyll site with Pagefind

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Nebudeme web stavět, protože GitHub Pages ho v Actions režimu umí zpracovat i přímo z kořene.
      # Pouze vytvoříme pracovní kopii a necháme Pagefind prohledat vaše .md soubory v docs/
      - name: Run Pagefind Search Indexer
        run: |
          mkdir -id _site
          cp -r * _site/ 2>/dev/null || true
          npx pagefind --site docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
