name: Deploy Jekyll site with Pagefind

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Žádný Jekyll build! Pouze vytvoříme složku pro publikování
      # a zkopírujeme do ní vaše zdrojové soubory
      - name: Prepare Static Files
        run: |
          mkdir -p _site
          cp -r * _site/ 2>/dev/null || true

      # Spustíme Pagefind, aby vytvořil indexy přímo nad složkou docs/
      # a výsledek uložíme do cílové složky _site
      - name: Run Pagefind Search Indexer
        run: npx pagefind --site _site --output-path _site/pagefind

      # Nahrajeme hotovou složku _site jako artefakt pro Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
